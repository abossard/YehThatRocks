services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=256M
      - --max-connections=200
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env.production}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yeh}
      MYSQL_USER: ${MYSQL_USER:-yeh}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env.production}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-yeh}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    image: ${WEB_IMAGE:-ghcr.io/simonjamesodell/yehthatrocks-web:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-yeh}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-yeh}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set in .env.production}
      APP_URL: ${APP_URL:?set in .env.production}
      YOUTUBE_DATA_API_KEY: ${YOUTUBE_DATA_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-120b}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      NODE_ENV: production

volumes:
  db-data: